<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PredictX — CGPA Distribution</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:#04040f;color:#fff;min-height:100vh}

/* BG */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(155,89,245,.18) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 20%,rgba(79,195,247,.12) 0%,transparent 60%),#04040f}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(155,89,245,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(155,89,245,.07) 1px,transparent 1px);
  background-size:60px 60px;animation:grid 20s linear infinite}
@keyframes grid{to{background-position:60px 60px}}

/* NAVBAR */
nav{position:sticky;top:0;z-index:999;height:70px;display:flex;align-items:center;justify-content:space-between;
  padding:0 50px;background:rgba(10,5,30,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(155,89,245,.4)}
nav a{text-decoration:none}
.links{display:flex;gap:8px}
.links a{color:rgba(255,255,255,.6);font-family:'Orbitron',monospace;font-size:11px;
  letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border-radius:8px;
  border:1px solid transparent;transition:all .3s}
.links a:hover{color:#fff;background:rgba(155,89,245,.15);border-color:rgba(155,89,245,.4)}
.links a.on{color:#fff;background:rgba(155,89,245,.2);border-color:rgba(155,89,245,.5);box-shadow:0 0 20px rgba(155,89,245,.4)}

/* CONTENT */
main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:50px 30px 60px;animation:up .8s ease both}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.tag{display:inline-block;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;
  color:#9b59f5;border:1px solid rgba(155,89,245,.4);padding:5px 16px;border-radius:20px;
  background:rgba(155,89,245,.08);margin-bottom:14px}
h1{font-family:'Orbitron',monospace;font-size:clamp(22px,3vw,32px);font-weight:900;margin-bottom:28px}
h1 span{background:linear-gradient(135deg,#9b59f5,#4fc3f7,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.card{background:rgba(255,255,255,.03);border:1px solid rgba(155,89,245,.2);border-radius:20px;
  padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(155,89,245,.7),rgba(79,195,247,.5),transparent)}
.card img{width:100%;border-radius:12px;display:block;cursor:zoom-in;transition:transform .3s}
.card img:hover{transform:scale(1.01)}

.summary{border-left:2px solid #9b59f5;background:rgba(155,89,245,.04);
  border-radius:0 14px 14px 0;padding:20px 24px;margin-bottom:24px}
.slabel{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#9b59f5;
  text-transform:uppercase;margin-bottom:10px}
.summary p{font-size:15px;color:rgba(255,255,255,.5);line-height:1.8}
.summary strong{color:rgba(255,255,255,.85)}

.back{display:inline-flex;align-items:center;gap:8px;font-family:'Orbitron',monospace;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);
  text-decoration:none;border:1px solid rgba(155,89,245,.3);padding:11px 22px;
  border-radius:10px;background:rgba(155,89,245,.07);transition:all .3s}
.back:hover{color:#fff;background:rgba(155,89,245,.18);border-color:rgba(155,89,245,.6);
  box-shadow:0 0 20px rgba(155,89,245,.4);transform:translateY(-2px)}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:9999;background:rgba(4,4,15,.95);
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
#lb.open{opacity:1;pointer-events:all}
#lb img{max-width:90vw;max-height:85vh;border-radius:16px;border:1px solid rgba(155,89,245,.4)}
#lbc{position:absolute;top:20px;right:24px;font-family:'Orbitron',monospace;font-size:10px;
  letter-spacing:2px;color:rgba(255,255,255,.5);cursor:pointer;border:1px solid rgba(255,255,255,.15);
  padding:8px 14px;border-radius:8px;transition:all .3s}
#lbc:hover{color:#fff;border-color:rgba(155,89,245,.5)}

@media(max-width:600px){nav{padding:0 20px}.links{display:none}}
</style>
</head>
<body>

<nav>
  <a href="/">
    <svg width="150" height="36" viewBox="0 0 160 38" fill="none">
      <defs>
        <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9b59f5"/><stop offset="100%" stop-color="#4fc3f7"/></linearGradient>
        <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9b59f5"/><stop offset="60%" stop-color="#4fc3f7"/><stop offset="100%" stop-color="#00e5ff"/></linearGradient>
      </defs>
      <polygon points="19,3 33,11 33,27 19,35 5,27 5,11" fill="url(#hg)" opacity=".15"/>
      <polygon points="19,3 33,11 33,27 19,35 5,27 5,11" fill="none" stroke="url(#hg)" stroke-width="1.5"/>
      <polygon points="19,10 26,19 19,28 12,19" fill="url(#hg)" opacity=".5"/>
      <circle cx="19" cy="19" r="3" fill="white" opacity=".9"/>
      <text x="42" y="16" font-family="Orbitron,monospace" font-size="13" font-weight="900" fill="url(#tg)" letter-spacing="2">PREDICT</text>
      <text x="44" y="31" font-family="Orbitron,monospace" font-size="9" fill="#4fc3f7" letter-spacing="6" opacity=".8">· X ·</text>
      <line x1="42" y1="19" x2="152" y2="19" stroke="url(#tg)" stroke-width=".5" opacity=".4"/>
    </svg>
  </a>
  <div class="links">
    <a href="/">Home</a>
    <a href="/predict_page">Predict</a>
    <a href="/charts" class="on">Charts</a>
  </div>
</nav>

<main>
  <div class="tag">⬡ Data Visualization</div>
  <h1>University Rating vs <span>Chance of Admission</span></h1>

  <div class="card">
    <img src="{{ url_for('static', filename='university_rating_boxplot.png') }}" alt="University Rating vs Chance of Admission"
         onclick="document.getElementById('lb').classList.add('open')"/>
  </div>

  <div class="summary">
    <div class="slabel">💡 Analysis Summary</div>
    <p>This boxplot shows the distribution of chance of admission across different university ratings.
    Higher ratings are associated with higher chances of admission.</p>
  </div>

  <a href="/charts" class="back">← Back to Charts</a>
</main>

<div id="lb" onclick="this.classList.remove('open')">
  <div id="lbc" onclick="event.stopPropagation();document.getElementById('lb').classList.remove('open')">✕ CLOSE</div>
  <img src="{{ url_for('static', filename='university_rating_boxplot.png') }}" onclick="event.stopPropagation()"/>
</div>

<script>
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('open')});
</script>
</body>
</html>
